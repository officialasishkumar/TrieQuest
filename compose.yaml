services:
  mysql:
    image: mysql:8.4@sha256:be18eb9dc45eea9b86cb74f8c68ab92ce8569ecc37ea4e6fade02e37036c5ff4
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-name-resolve
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-triequest}
      MYSQL_USER: ${MYSQL_USER:-triequest}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in your environment or .env file}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in your environment or .env file}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - app

  backend:
    build:
      context: ./backend
    environment:
      TRIEQUEST_ENVIRONMENT: production
      TRIEQUEST_SECRET_KEY: ${TRIEQUEST_SECRET_KEY:?set TRIEQUEST_SECRET_KEY in your environment or .env file}
      TRIEQUEST_DATABASE_URL: mysql+pymysql://${MYSQL_USER:-triequest}:${MYSQL_PASSWORD:?set MYSQL_PASSWORD in your environment or .env file}@mysql:3306/${MYSQL_DATABASE:-triequest}?charset=utf8mb4
      TRIEQUEST_DATABASE_AUTO_MIGRATE: ${TRIEQUEST_DATABASE_AUTO_MIGRATE:-true}
      TRIEQUEST_CORS_ORIGINS: ${TRIEQUEST_CORS_ORIGINS:?set TRIEQUEST_CORS_ORIGINS in your environment or .env file}
      TRIEQUEST_ALLOWED_HOSTS: ${TRIEQUEST_ALLOWED_HOSTS:?set TRIEQUEST_ALLOWED_HOSTS in your environment or .env file}
      TRIEQUEST_SEED_DEMO_DATA: ${TRIEQUEST_SEED_DEMO_DATA:-false}
      TRIEQUEST_AUTH_RATE_LIMIT_MAX_ATTEMPTS: ${TRIEQUEST_AUTH_RATE_LIMIT_MAX_ATTEMPTS:-5}
      TRIEQUEST_AUTH_RATE_LIMIT_WINDOW_SECONDS: ${TRIEQUEST_AUTH_RATE_LIMIT_WINDOW_SECONDS:-300}
      TRIEQUEST_ENABLE_ADMIN: ${TRIEQUEST_ENABLE_ADMIN:-false}
      TRIEQUEST_ADMIN_EMAILS: ${TRIEQUEST_ADMIN_EMAILS:-}
      TRIEQUEST_ADMIN_RATE_LIMIT_MAX_ATTEMPTS: ${TRIEQUEST_ADMIN_RATE_LIMIT_MAX_ATTEMPTS:-5}
      TRIEQUEST_ADMIN_RATE_LIMIT_WINDOW_SECONDS: ${TRIEQUEST_ADMIN_RATE_LIMIT_WINDOW_SECONDS:-300}
      TRIEQUEST_FRIEND_LOOKUP_RATE_LIMIT_MAX_ATTEMPTS: ${TRIEQUEST_FRIEND_LOOKUP_RATE_LIMIT_MAX_ATTEMPTS:-20}
      TRIEQUEST_FRIEND_LOOKUP_RATE_LIMIT_WINDOW_SECONDS: ${TRIEQUEST_FRIEND_LOOKUP_RATE_LIMIT_WINDOW_SECONDS:-60}
      TRIEQUEST_FORWARDED_ALLOW_IPS: ${TRIEQUEST_FORWARDED_ALLOW_IPS:-*}
      TRIEQUEST_RUN_STARTUP_TASKS_ON_APP_START: "false"
      TRIEQUEST_ENABLE_DOCS: ${TRIEQUEST_ENABLE_DOCS:-false}
      TRIEQUEST_WEB_CONCURRENCY: ${TRIEQUEST_WEB_CONCURRENCY:-1}
    expose:
      - "8000"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - app

  caddy:
    image: caddy:2.10.2-alpine@sha256:4c6e91c6ed0e2fa03efd5b44747b625fec79bc9cd06ac5235a779726618e530d
    depends_on:
      backend:
        condition: service_healthy
    environment:
      TRIEQUEST_PUBLIC_HOSTNAME: ${TRIEQUEST_PUBLIC_HOSTNAME:?set TRIEQUEST_PUBLIC_HOSTNAME in your environment or .env file}
      TRIEQUEST_ACME_EMAIL: ${TRIEQUEST_ACME_EMAIL:?set TRIEQUEST_ACME_EMAIL in your environment or .env file}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    networks:
      - public
      - app

  frontend:
    profiles:
      - frontend
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app

volumes:
  mysql_data:
  caddy_data:
  caddy_config:

networks:
  app:
    internal: true
  public:
